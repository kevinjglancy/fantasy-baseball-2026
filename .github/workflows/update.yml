name: Update Fantasy Baseball Dashboard

on:
  schedule:
    - cron: '0 11 * * *'    # Daily 6 AM ET (11 AM UTC) — collect player stats
    - cron: '0 14 * * 1'    # Monday 10 AM ET (2 PM UTC) — collect previous week matchup stats
  workflow_dispatch:          # Manual trigger from GitHub UI anytime

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          echo "CHROMEDRIVER_PATH=$(which chromedriver)" >> $GITHUB_ENV
          echo "CHROME_BINARY=$(which chromium-browser)" >> $GITHUB_ENV
          echo "Chrome: $(chromium-browser --version)"
          echo "ChromeDriver: $(chromedriver --version)"

      - name: Install Python dependencies
        working-directory: code
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        working-directory: code
        run: |
          echo "SWID=${{ secrets.SWID }}" > .env
          echo "ESPN_S2=${{ secrets.ESPN_S2 }}" >> .env

      - name: Collect yesterday's player stats
        working-directory: code
        run: |
          YESTERDAY=$(date -d "yesterday" +'%Y-%m-%d')
          echo "Collecting stats for $YESTERDAY"
          python collect_player_daily.py --league-id 94668654 --start-date $YESTERDAY --end-date $YESTERDAY

      - name: Collect previous week's matchup stats (Mondays only)
        if: github.event.schedule == '0 14 * * 1' || github.event_name == 'workflow_dispatch'
        working-directory: code
        run: |
          LAST_SUNDAY=$(date -d "last sunday" +'%Y-%m-%d')
          echo "Collecting matchup stats for week ending $LAST_SUNDAY"
          python collect_daily.py --league-id 94668654 --start-date $LAST_SUNDAY --end-date $LAST_SUNDAY

      - name: Regenerate dashboard
        working-directory: code
        run: python generate_dashboard.py

      - name: Commit and push everything
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html code/fantasy_baseball.db
          git diff --staged --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d')"
          git push
