name: Update Fantasy Baseball Dashboard

on:
  schedule:
    - cron: '0 7 * * *'    # Daily 3 AM ET — collect player stats
    - cron: '0 14 * * 1'   # Monday 10 AM ET — collect new matchup stats
  workflow_dispatch:         # Manual trigger from GitHub UI anytime

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        working-directory: code
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        working-directory: code
        run: |
          echo "SWID=${{ secrets.SWID }}" > .env
          echo "ESPN_S2=${{ secrets.ESPN_S2 }}" >> .env

      - name: Collect today's player stats
        working-directory: code
        run: |
          TODAY=$(date +'%Y-%m-%d')
          python collect_player_daily.py --league-id 94668654 --start-date $TODAY --end-date $TODAY

      - name: Collect weekly matchup stats (Mondays only)
        if: github.event.schedule == '0 14 * * 1' || github.event_name == 'workflow_dispatch'
        working-directory: code
        run: python collect_daily.py --league-id 94668654

      - name: Regenerate dashboard
        working-directory: code
        run: python generate_dashboard.py

      - name: Copy dashboard to root for GitHub Pages
        run: cp code/dashboard.html index.html

      - name: Commit and push everything
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html code/fantasy_baseball.db
          git diff --staged --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d')"
          git push
